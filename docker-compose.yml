services:
  documentdb:
    image: ghcr.io/documentdb/documentdb/documentdb-local:latest
    command: ["--username", "testuser", "--password", "testpass123"]
    ports:
      - "10260:10260"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh --quiet
          "mongodb://testuser:testpass123@localhost:10260/?directConnection=true&tls=true&tlsInsecure=true&authSource=admin&authMechanism=SCRAM-SHA-256"
          --eval 'quit(db.adminCommand({ ping: 1 }).ok === 1 ? 0 : 1)'
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  mongofuse:
    build: .
    command:
      - mount
      - "mongodb://testuser:testpass123@documentdb:10260/?directConnection=true&tls=true&tlsInsecure=true"
      - /mnt/db
    cap_add:
      - SYS_ADMIN
    devices:
      - "/dev/fuse"
    security_opt:
      - apparmor:unconfined
    depends_on:
      documentdb:
        condition: service_healthy
